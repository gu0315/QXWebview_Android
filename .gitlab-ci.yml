# 经由 GitLab 自带的 Dependency Proxy 代理拉取 Docker Hub,绕开匿名限流 / 集群出口墙。
# 注意:本 Runner 的 allowed_pull_policies 为空,禁止在 CI 里指定 pull_policy,故这里不写。
image: ${CI_DEPENDENCY_PROXY_GROUP_IMAGE_PREFIX}/cimg/android:2026.03.1

stages:
  - verify
  - publish

variables:
  GRADLE_USER_HOME: "$CI_PROJECT_DIR/.gradle"

cache:
  key: "$CI_PROJECT_ID-gradle"
  paths:
    - .gradle/wrapper
    - .gradle/caches

verify_qx_hybrid:
  stage: verify
  script:
    - chmod +x ./gradlew
    - ./gradlew :qx_hybrid:assembleRelease

publish_qx_hybrid:
  stage: publish
  rules:
    - if: "$CI_COMMIT_TAG"
  script:
    - chmod +x ./gradlew
    - |
      ./gradlew :qx_hybrid:publishReleasePublicationToGitLabRepository \
        -PQX_HYBRID_VERSION="$CI_COMMIT_TAG" \
        -PMAVEN_REPOSITORY_NAME=GitLab \
        -PMAVEN_REPOSITORY_URL="$CI_API_V4_URL/projects/$CI_PROJECT_ID/packages/maven" \
        -PMAVEN_USERNAME=gitlab-ci-token \
        -PMAVEN_PASSWORD="$CI_JOB_TOKEN"
